<div class="tab-panel" id="panel-reports">

  <!-- SCREEN 1: Staff Cards Grid -->
  <div id="staff-cards-screen">
  <div class="container">

    <!-- Page Header -->
    <div class="tab-page-header">
      <div class="tab-page-header-left">
        <div class="tab-page-icon" style="display:flex;align-items:center;justify-content:center;width:44px;height:44px;background:linear-gradient(135deg,rgba(16,185,129,0.22),rgba(16,185,129,0.06));border:1px solid rgba(16,185,129,0.35);border-radius:14px;box-shadow:0 4px 16px rgba(16,185,129,0.18),inset 0 1px 0 rgba(255,255,255,0.08);">
            <i class="fas fa-users" style="font-size:22px;color:#0eca8e;"></i>
          </div>
        <div>
          <div class="tab-page-title">Staff Reports</div>
          <div class="tab-page-sub">Performance overview for all team members</div>
        </div>
      </div>
      <div class="tab-page-header-right">
        <div class="report-timeframe-wrap">
          <span class="report-timeframe-icon">📅</span>
          <select id="reportTimeframe" class="report-timeframe-select">
            <option value="week">This Week</option>
            <option value="month">This Month</option>
            <option value="all">All Time</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Search -->
    <div class="report-search-bar">
      <span class="task-search-icon">🔍</span>
      <input type="text" id="reportStaffSearch" placeholder="Search staff by name…" class="task-search-input"/>
    </div>

    <div id="staffCardsGrid" class="staff-cards-grid"></div>

  </div>
  </div>

  <!-- SCREEN 2: Individual Staff Report -->
  <div id="staff-report-page">
  <div class="container" style="max-width:820px;">

    <!-- Back nav -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
      <button onclick="closeStaffReport()" class="btn btn-ghost" style="padding:7px 18px;font-size:13px;">&#8592; Back</button>
      <div style="font-size:11px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;">Staff Report</div>
      <div style="margin-left:auto;display:flex;gap:8px;">
        <select id="srTimeframe" style="font-size:12px;padding:6px 12px;border-radius:8px;background:var(--surface2);border:1px solid var(--surface3);color:var(--text);">
          <option value="week">This Week</option>
          <option value="month">This Month</option>
          <option value="all">All Time</option>
        </select>
      </div>
    </div>

    <!-- Hero card -->
    <div class="sr-hero">
      <div style="display:flex;align-items:center;gap:0;">
        <div class="sr-avatar" id="sr-avatar-el"></div>
        <div>
          <div style="font-size:9px;text-transform:uppercase;letter-spacing:2.5px;color:rgba(16,185,129,0.65);margin-bottom:4px;">Staff Member</div>
          <div id="sr-name" style="font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:#F0EAD6;line-height:1.1;"></div>
          <div id="sr-staffid-badge" style="display:inline-block;margin-top:6px;background:rgba(201,169,110,0.12);border:1px solid rgba(201,169,110,0.3);color:var(--gold);padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:1.5px;"></div>
          <div id="sr-position-dept" style="font-size:12px;color:rgba(240,234,214,0.45);margin-top:5px;letter-spacing:0.5px;"></div>
          <div id="sr-phone" style="font-size:12px;color:rgba(240,234,214,0.45);margin-top:3px;letter-spacing:1px;"></div>
          <div id="sr-period-label" style="margin-top:10px;display:inline-block;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.25);color:var(--gold);padding:3px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.5px;"></div>
        </div>
      </div>
    </div>

    <!-- Stats row -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;">
      <div style="background:var(--surface);border:1px solid rgba(16,185,129,0.18);border-radius:14px;padding:18px 14px;text-align:center;position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-light));"></div>
        <div id="sr-stat-orders" style="font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:var(--gold);">0</div>
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);margin-top:5px;">Tasks</div>
      </div>
      <div style="background:var(--surface);border:1px solid rgba(16,185,129,0.18);border-radius:14px;padding:18px 14px;text-align:center;position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),var(--gold-light));"></div>
        <div id="sr-stat-revenue" style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--green);">₦0</div>
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);margin-top:5px;">Revenue</div>
      </div>
      <div style="background:var(--surface);border:1px solid rgba(16,185,129,0.18);border-radius:14px;padding:18px 14px;text-align:center;position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-light));"></div>
        <div id="sr-stat-items" style="font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:var(--gold);">0</div>
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);margin-top:5px;">Items Sewn</div>
      </div>
      <div style="background:var(--surface);border:1px solid rgba(224,82,82,0.22);border-radius:14px;padding:18px 14px;text-align:center;position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),rgba(224,82,82,0.4));"></div>
        <div id="sr-stat-balance" style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:#f87171;">₦0</div>
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);margin-top:5px;">Outstanding</div>
      </div>
    </div>

    <!-- Status breakdown -->
    <div style="background:var(--surface);border:1px solid var(--surface3);border-radius:12px;padding:20px;margin-bottom:18px;">
      <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:14px;">Task Status Breakdown</div>
      <div id="sr-status-bars"></div>
    </div>

    <!-- Outstanding Task -->
    <div id="sr-outstanding-wrap" style="background:var(--surface);border:1px solid rgba(224,82,82,0.2);border-radius:12px;padding:20px;margin-bottom:18px;display:none;">
      <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#f87171;margin-bottom:14px;">⚠ Outstanding Balances</div>
      <div id="sr-outstanding-list"></div>
    </div>

    <!-- Top Services -->
    <div style="background:var(--surface);border:1px solid var(--surface3);border-radius:12px;padding:20px;margin-bottom:18px;">
      <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:14px;">Top Services</div>
      <div id="sr-top-services"></div>
    </div>

    <!-- Full order history -->
    <div style="background:var(--surface);border:1px solid var(--surface3);border-radius:12px;overflow:hidden;margin-bottom:24px;">
      <div style="padding:16px 20px;border-bottom:1px solid var(--surface3);background:var(--surface2);">
        <div style="font-size:14px;font-weight:600;color:var(--text);">Full Task History</div>
        <div id="sr-order-count" style="font-size:11px;color:var(--text-muted);margin-top:2px;"></div>
      </div>
      <div id="sr-order-list" style="max-height:400px;overflow-y:auto;"></div>
    </div>

  </div>
  </div>

</div>
