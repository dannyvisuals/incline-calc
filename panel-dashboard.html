<main class="tab-panel" id="panel-dashboard" style="padding:36px 32px;gap:28px;">

  <!-- Greeting -->
  <p class="content__greeting" id="greeting"></p>

  <!-- Metric Cards -->
  <div class="metrics">

    <div class="metric-card">
      <span class="metric-card__label">Total Revenue</span>
      <span class="metric-card__value" id="stat-revenue">—</span>
      <span class="metric-card__delta metric-card__delta--up" id="stat-revenue-delta">Loading…</span>
    </div>

    <div class="metric-card" style="--accent:rgba(96,165,250,0.6);">
      <span class="metric-card__label">Task</span>
      <span class="metric-card__value" id="stat-orders">—</span>
      <span class="metric-card__delta metric-card__delta--warn" id="stat-orders-delta">Loading…</span>
    </div>

    <div class="metric-card">
      <span class="metric-card__label">Active Staff</span>
      <span class="metric-card__value" id="stat-staff">—</span>
      <span class="metric-card__delta metric-card__delta--up" id="stat-staff-delta">Loading…</span>
    </div>

    <div class="metric-card" style="--accent:rgba(248,113,113,0.6);">
      <span class="metric-card__label">Loans Outstanding</span>
      <span class="metric-card__value" id="stat-loans">—</span>
      <span class="metric-card__delta metric-card__delta--warn" id="stat-loans-delta">Loading…</span>
    </div>

  </div>

  <!-- Bottom panels -->
  <div class="panels">
    <div class="panel">
      <h2 class="panel__title">Recent Task</h2>
      <div id="dashboard-recent-orders" style="font-size:12px;color:rgba(240,240,240,0.28);font-style:italic;">
        Connect Supabase to populate
      </div>
    </div>
    <div class="panel">
      <h2 class="panel__title">Activity Feed</h2>
      <div id="dashboard-activity" style="font-size:12px;color:rgba(240,240,240,0.28);font-style:italic;">
        Activity log goes here
      </div>
    </div>
  </div>

</main>
