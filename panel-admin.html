    <div class="pa-sidebar-card" style="border:1px solid rgba(16,185,129,0.25);background:rgba(16,185,129,0.04);">
      <div class="pa-sidebar-label" style="color:rgba(16,185,129,0.8);">&#128100; Admin Display Name</div>
      <div style="font-size:10px;color:var(--text-muted);margin-bottom:8px;">Changes the greeting and avatar initial everywhere</div>
      <div style="position:relative;display:flex;gap:8px;">
        <input type="text" id="adminNameInput" placeholder="e.g. Gerald"
          style="flex:1;background:rgba(16,185,129,0.06);border:1.5px solid rgba(16,185,129,0.25);color:var(--text);border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600;font-family:inherit;outline:none;transition:border-color 0.15s;"
          onfocus="this.style.borderColor='rgba(16,185,129,0.6)'"
          onblur="this.style.borderColor='rgba(16,185,129,0.25)'"
          onkeydown="if(event.key==='Enter') saveAdminName()"/>
        <button onclick="saveAdminName()"
          style="padding:9px 14px;background:linear-gradient(135deg,rgba(16,185,129,0.22),rgba(16,185,129,0.1));border:1px solid rgba(16,185,129,0.4);color:var(--green);border-radius:10px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all 0.15s;"
          onmouseenter="this.style.background='rgba(16,185,129,0.25)'"
          onmouseleave="this.style.background='linear-gradient(135deg,rgba(16,185,129,0.22),rgba(16,185,129,0.1))'">
          Save
        </button>
      </div>
      <div id="adminNameStatus" style="font-size:10px;color:rgba(16,185,129,0.7);margin-top:6px;display:none;">&#10003; Name updated!</div>
    </div>

    <!-- Search -->
    <div class="pa-sidebar-card">
      <div class="pa-sidebar-label">Search</div>
      <div class="pa-search">
        <span class="pa-search-icon">🔍</span>
        <input type="text" id="adminSearch" placeholder="Filter services…"/>
      </div>
    </div>

    <!-- Save -->
    <div class="pa-sidebar-card">
      <div class="pa-sidebar-label">Save Changes</div>
      <button class="pa-save-btn" id="savePricesBtn" onclick="saveAllPrices()">💾 Save All Prices</button>
      <div class="pa-status" id="adminSaveStatus">Not yet saved.</div>
    </div>

    <!-- Add custom -->
    <div class="pa-sidebar-card">
      <div class="pa-sidebar-label">Add Custom Service</div>
      <div class="pa-add-field">
        <label>Service Name</label>
        <input type="text" id="customName" placeholder="e.g. Jumpsuit, Gown…" onkeypress="if(event.which===13)addCustomService()"/>
      </div>
      <div class="pa-add-field">
        <label>Category</label>
        <select id="customCat">
          <option>My Custom Items</option>
          <option>Cutting Fee</option>
          <option>Sewing Fee</option>
        </select>
      </div>
      <div class="pa-add-field">
        <label>Price (₦)</label>
        <input type="number" id="customPrice" placeholder="0" min="0"/>
      </div>
      <button class="pa-add-btn" id="addCustomBtn" onclick="addCustomService()">+ Add Service</button>
    </div>

  </div>

</div></div>
